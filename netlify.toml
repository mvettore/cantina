[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions."scan-label"]
  timeout = 26

[functions."enrich-wine"]
  timeout = 26

[functions."pair-wine"]
  timeout = 26

[functions."summarize-cellar"]
  timeout = 26

[functions."search-wine-url"]
  timeout = 26

[[redirects]]
  from = "/api/data"
  to = "/.netlify/functions/data"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
